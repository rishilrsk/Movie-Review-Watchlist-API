<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream | Premium Movie Reviews</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="glass-nav">
        <div class="nav-container">
            <h1 class="logo" id="nav-logo">CineStream</h1>
            <div class="nav-links">
                <button class="nav-btn active" id="nav-home">Home</button>
                <button class="nav-btn" id="nav-watchlist" style="display: none;">My Watchlist</button>
                <button class="nav-btn" id="nav-add-movie" style="display: none;">+ Add Movie</button>
                <button class="nav-btn outline-btn" id="nav-login">Login</button>
                <button class="nav-btn outline-btn" id="nav-logout" style="display: none;">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content">
        
        <!-- 1. Home View -->
        <section id="view-home" class="view active">
            <div class="hero">
                <h2>Discover Your Next Favorite Movie</h2>
                <p>Explore reviews, ratings, and build your perfect watchlist.</p>
            </div>
            <div class="movies-grid" id="movies-container">
                <!-- Movie cards will be injected here by JS -->
                <div class="loader">Loading movies...</div>
            </div>
        </section>

        <!-- 2. Auth View (Login / Register) -->
        <section id="view-auth" class="view">
            <div class="auth-container glass-panel">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login">Login</button>
                    <button class="auth-tab" id="tab-register">Register</button>
                </div>

                <!-- Login Form -->
                <form id="form-login" class="auth-form active">
                    <h3>Welcome Back</h3>
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="primary-btn">Login</button>
                    <div id="login-error" class="error-msg"></div>
                </form>

                <!-- Register Form -->
                <form id="form-register" class="auth-form">
                    <h3>Create an Account</h3>
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <button type="submit" class="primary-btn">Register</button>
                    <div id="reg-error" class="error-msg"></div>
                </form>
            </div>
        </section>

        <!-- 3. Movie Detail View -->
        <section id="view-movie-detail" class="view">
            <button class="back-btn" id="btn-back-home">← Back to Movies</button>
            <div class="movie-detail-content glass-panel" id="movie-detail-container">
                <!-- Movie details injected here -->
            </div>
            
            <div class="reviews-section">
                <h3>Reviews</h3>
                
                <!-- Add Review Form (Only visible if logged in) -->
                <div id="add-review-container" class="glass-panel" style="display: none;">
                    <h4>Leave a Review</h4>
                    <form id="form-review">
                        <div class="input-group">
                            <label for="review-rating">Rating (1-5)</label>
                            <input type="number" id="review-rating" min="1" max="5" required>
                        </div>
                        <div class="input-group">
                            <label for="review-comment">Comment</label>
                            <textarea id="review-comment" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="primary-btn">Post Review</button>
                    </form>
                </div>

                <div id="reviews-list" class="reviews-list">
                    <!-- Reviews injected here -->
                </div>
            </div>
        </section>

        <!-- 4. Watchlist View -->
        <section id="view-watchlist" class="view">
            <h2>My Private Watchlist</h2>
            <div class="movies-grid" id="watchlist-container">
                <!-- Watchlist movies injected here -->
            </div>
        </section>

        <!-- 5. Add Movie View -->
        <section id="view-add-movie" class="view">
            <div class="auth-container" style="max-width: 600px;">
                <form id="form-add-movie" class="auth-form active">
                    <h3>Add a New Movie</h3>
                    <div class="input-group">
                        <label for="add-title">Movie Title</label>
                        <input type="text" id="add-title" required>
                    </div>
                    <div class="input-group">
                        <label for="add-genre">Genre (e.g. Sci-Fi, Action, Drama)</label>
                        <input type="text" id="add-genre" required>
                    </div>
                    <div class="input-group">
                        <label for="add-desc">Description</label>
                        <textarea id="add-desc" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="primary-btn">Create Movie</button>
                    <div id="add-movie-error" class="error-msg"></div>
                </form>
            </div>
        </section>

    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Action Successful!</div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
